name: E2E

# Playwright smoke + auth suite. Runs against a deployed environment —
# tests auto-skip when E2E_EMAIL / E2E_PASSWORD secrets aren't present,
# so forks and pre-setup branches don't fail. Kept separate from ci.yml
# so a broken deploy doesn't block typecheck/build PRs.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target base URL"
        required: false
        default: "https://ma.internal.hksglobal.group"
  schedule:
    # Nightly at 03:00 UTC against the default base URL.
    - cron: "0 3 * * *"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # workflow_dispatch input reaches us via GitHub-validated URL string;
      # quoted via env to avoid any shell-interpolation surface in run steps.
      E2E_BASE_URL: ${{ inputs.base_url || 'https://ma.internal.hksglobal.group' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
